<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter un jeu - GameSwap</title>
</head>
<body>
<h1>🔍 Ajouter un jeu à ma collection</h1>

<div class="search-container">
    <input
            type="text"
            id="search-input"
            placeholder="Rechercher un jeu... (ex: Zelda, FIFA, GTA)"
            autocomplete="off"
    >
    <p id="loading">⏳ Recherche en cours...</p>
    <div id="results"></div>

    <!-- Confirmation avant ajout -->
    <div id="confirmation">
        <img id="confirm-image" src="" alt="">
        <h2 id="confirm-title"></h2>
        <p>🕹️ <strong>Plateformes :</strong> <span id="confirm-platforms"></span></p>
        <p>📅 <strong>Sortie :</strong> <span id="confirm-released"></span></p>
        <p>⭐ <strong>Note :</strong> <span id="confirm-rating"></span>/5</p>

        <form action="/add-game" method="POST">
            <input type="hidden" name="title" id="form-title">
            <input type="hidden" name="platform" id="form-platform">
            <input type="hidden" name="image" id="form-image">
            <button type="submit">✅ Ajouter à ma collection</button>
            <button type="button" onclick="cancelSelection()" style="background:#555; margin-left:10px;">
                ❌ Annuler
            </button>
        </form>
    </div>
</div>

<br>
<a href="/">⬅ Retour à l'accueil</a>

<script>
    let searchTimeout;

    document.getElementById('search-input').addEventListener('input', function () {
        clearTimeout(searchTimeout);
        const query = this.value.trim();

        if (query.length < 2) {
            document.getElementById('results').innerHTML = '';
            return;
        }

        document.getElementById('loading').style.display = 'block';
        document.getElementById('results').innerHTML = '';
        document.getElementById('confirmation').style.display = 'none';

        // Petit délai pour ne pas spammer l'API à chaque lettre
        searchTimeout = setTimeout(() => searchGames(query), 400);
    });

    async function searchGames(query) {
        try {
            const response = await fetch(`/api/search-games?q=${encodeURIComponent(query)}`);
            const games = await response.json();

            document.getElementById('loading').style.display = 'none';

            const container = document.getElementById('results');
            container.innerHTML = '';

            if (games.length === 0) {
                container.innerHTML = '<p>Aucun jeu trouvé.</p>';
                return;
            }

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <img src="${game.image || '/img/no-image.png'}" alt="${game.name}">
                    <div class="info">
                        <h3>${game.name}</h3>
                        <p>${game.released || 'Date inconnue'}</p>
                    </div>
                `;
                card.addEventListener('click', () => selectGame(game));
                container.appendChild(card);
            });

        } catch (err) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('results').innerHTML = '<p>Erreur lors de la recherche.</p>';
        }
    }

    function selectGame(game) {
        // Remplir la confirmation
        document.getElementById('confirm-image').src = game.image || '';
        document.getElementById('confirm-title').textContent = game.name;
        document.getElementById('confirm-platforms').textContent = game.platforms;
        document.getElementById('confirm-released').textContent = game.released || 'Inconnue';
        document.getElementById('confirm-rating').textContent = game.rating || '?';

        // Remplir le formulaire caché
        document.getElementById('form-title').value = game.name;
        document.getElementById('form-platform').value = game.platforms;
        document.getElementById('form-image').value = game.image || '';

        // Afficher la confirmation
        document.getElementById('confirmation').style.display = 'block';
        document.getElementById('results').innerHTML = '';
        document.getElementById('search-input').value = '';

        // Scroll vers la confirmation
        document.getElementById('confirmation').scrollIntoView({ behavior: 'smooth' });
    }

    function cancelSelection() {
        document.getElementById('confirmation').style.display = 'none';
    }
</script>
</body>
</html>
